<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Logos{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="rail">
        <strong>L</strong>
        <ul>
            <li><a href="/home" {% if request.path == '/home' %}class="active"{% endif %}>H</a></li>
            <li><a href="/library" {% if request.path.startswith('/library') %}class="active"{% endif %}>L</a></li>
            <li><a href="/community" {% if request.path == '/community' %}class="active"{% endif %}>#</a></li>
            <li><a href="/profile" {% if request.path == '/profile' %}class="active"{% endif %}>U</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
