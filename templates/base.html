<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Logos{% endblock %}</title>
    <link rel="icon" href="/static/icons/logo.svg" type="image/svg+xml">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Sidebar nav rail, logo, page links (active highlighted), logout -->
    <nav class="rail">
        <img class="rail-logo" src="/static/icons/logo.svg" width="25" height="25" alt="Logos">
        <ul>
            <li><a href="/home" {% if request.path == '/home' %}class="active"{% endif %}><img src="/static/icons/house.svg" width="18" height="18"></a></li>
            <li><a href="/library" {% if request.path.startswith('/library') %}class="active"{% endif %}><img src="/static/icons/library.svg" width="18" height="18"></a></li>
            <li><a href="/calendar" {% if request.path == '/calendar' %}class="active"{% endif %}><img src="/static/icons/calendar.svg" width="18" height="18"></a></li>
            <li><a href="/profile" {% if request.path == '/profile' %}class="active"{% endif %}><img src="/static/icons/user.svg" width="18" height="18"></a></li>
        </ul>
        <a href="/logout" class="logout-btn" aria-label="Logout">
            <img src="/static/icons/log-out.svg" width="18" height="18" alt="">
        </a>
    </nav>

    <!-- Page widgets by other templates -->
    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}

    <!-- Register the service worker so the app works offline -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js");
        }
    </script>
</body>
</html>
