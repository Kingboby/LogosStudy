{% extends "base.html" %}

{% block title %}Profile - Logos{% endblock %}

{% block content %}
    <h1 class="profile-name">{{ tmplUsername }}</h1>

<div class="profile-stats">
        <div class="profile-stat-card">
            <span class="profile-stat-number">{{ tmplTotalSessions }}</span>
            <span class="profile-stat-label">Sessions Completed</span>
        </div>
        <div class="profile-stat-card">
            <span class="profile-stat-number">{{ tmplTotalMinutes }}</span>
            <span class="profile-stat-label">Minutes Studied</span>
        </div>
    </div>
{% endblock %}
