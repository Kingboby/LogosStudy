{% extends "base.html" %}

{% block title %}Register - Logos{% endblock %}

{% block content %}
<!-- register card: error message if needed + username/password form -->
<div class="auth">
    <div class="auth-card">
        <h1 class="auth-title">Register</h1>

        {% if tmplError %}
        <p class="form-error">{{ tmplError }}</p>
        {% endif %}

        <form class="auth-form" method="POST" action="/register">
            <label class="auth-field">
                <span class="auth-label">Username</span>
                <input type="text" name="username" required autofocus>
            </label>
            <label class="auth-field">
                <span class="auth-label">Password</span>
                <input type="password" name="password" required>
            </label>
            <button type="submit" class="auth-submit">Register</button>
        </form>

        <p class="auth-alt"><a href="/login">Already have an account? Log in</a></p>
    </div>
</div>
{% endblock %}
