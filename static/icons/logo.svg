<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Logos">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap');
      .logomark {
        font-family: "Instrument Serif", "Times New Roman", serif;
        font-style: italic;
        font-weight: 400;
        fill: #ffffff;
      }
    ]]></style>
  </defs>

  <!-- Dark ink circle (token ink, #1a1a1a), 32px padding inside the 512 square -->
  <circle cx="256" cy="256" r="224" fill="#1a1a1a"/>

  <!-- Italic serif "L" (token paper-2, #ffffff), kept inside the central 80% safe zone.
       font-size 286 is the circle diameter (448) times the sidebar 14/22 ratio. -->
  <text class="logomark" x="256" y="256" font-size="286"
        text-anchor="middle" dominant-baseline="central">L</text>
</svg>
